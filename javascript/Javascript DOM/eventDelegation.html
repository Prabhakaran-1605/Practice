<!-- Event delegation is a JavaScript technique where a single event listener is attached to a parent element to manage events for all of its child elements, leveraging the concept of event bubbling -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <ul id="eventDelegation">
        <li>Home</li>
        <li>User</li>
        <li>Settings</li>
    </ul>

    <script>
        const parentElement = document.getElementById("eventDelegation")

        parentElement.addEventListener ('click',function(){
            if(event.target.tagName == "LI"){
                console.log("Clicked: ", event.target.textContent)
                event.target.style.color = "red"
            }
        })
    </script>
</body>
</html>
